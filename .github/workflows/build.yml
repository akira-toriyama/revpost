name: build

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: this workflow only reads the repo.
permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Shared Go CI core (build / vet / race-test / module-hygiene / golangci-lint v2),
  # SHA-pinned once in the hub. go-version-file drives the build toolchain.
  ci:
    uses: akira-toriyama/.github/.github/workflows/go-ci.yml@v2
    with:
      go-version-file: go.mod

  # Do the tests this pull request adds actually bite? The gate runs them against
  # the source BEFORE the pull request and fails the ones that all still pass — a
  # test that would have been green without its own fix is not evidence of that fix,
  # and nothing but habit was checking. Stands down on its own when there is nothing
  # to prove (no shipping change, no new test, an annotated behaviour pin), so it
  # costs a pull request nothing to carry.
  # Rationale + the two opt-outs: akira-toriyama/.github/blob/main/docs/go-bite.md
  bite:
    uses: akira-toriyama/.github/.github/workflows/go-bite.yml@v2
    with:
      go-version-file: go.mod

  # Repo-specific check: exercise the shipped binary on both OSes the core test
  # job (build + unit tests) doesn't separately cover.
  extras:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Smoke test only builds and runs the binary, never pushes — drop the
          # persisted checkout token. t-yaxa
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: smoke test
        run: |
          go build -o /tmp/revpost ./cmd/revpost
          /tmp/revpost --version
          /tmp/revpost --help >/dev/null

  # Bounded fuzzing (Ubuntu-only, house pattern): actually mutate the pure-core
  # corpus. The shared go-ci test job only replays the seed inputs, so without
  # this the FuzzXxx targets never fuzz.
  fuzz:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Fuzzing writes its corpus to the local build cache, never pushes it
          # back — drop the persisted checkout token. t-yaxa
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: fuzz (bounded)
        run: |
          go test -run='^$' -fuzz='^FuzzParseInput$' -fuzztime=30s ./internal/core
          go test -run='^$' -fuzz='^FuzzParseRDJSON$' -fuzztime=30s ./internal/core
          go test -run='^$' -fuzz='^FuzzBuildCommentSet$' -fuzztime=30s ./internal/core
